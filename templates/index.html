<!doctype html>
<html>
  <head>
    <title>AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        margin: 0;
        overflow-x: hidden;
      }

      #bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
    </style>
  </head>

  <body class="bg-black text-white overflow-x-hidden">
    <!-- 🔥 BACKGROUND -->
    <canvas id="bg"></canvas>

    <!-- 🔥 BACK BUTTON -->
    <a
      href="/dashboard"
      class="fixed top-3 left-3 sm:top-5 sm:left-5 z-20 flex items-center gap-2 bg-[#0b1220] border border-gray-700 px-4 py-2 rounded-xl text-sm sm:text-base text-gray-300 hover:text-white hover:border-orange-500 transition duration-300"
    >
      ⬅ Dashboard
    </a>

    <!-- 🔥 MAIN -->
    <div
      class="relative z-10 min-h-screen flex items-center justify-center px-4 sm:px-6 py-10"
    >
      <div
        class="grid grid-cols-1 lg:grid-cols-2 gap-10 w-full max-w-7xl mx-auto"
      >
        <!-- LEFT -->
        <div class="flex flex-col justify-center text-center lg:text-left">
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold mb-4 sm:mb-6">
            AI Smart Assistant
          </h1>
          <p class="text-gray-400 text-sm sm:text-base lg:text-lg">
            Chatbot + Resume Analyzer 🚀
          </p>
        </div>

        <!-- RIGHT -->
        <div class="flex flex-col gap-6 sm:gap-8 w-full">
          <!-- CHAT -->
          <div
            class="bg-[#0b1220]/70 backdrop-blur-xl p-4 sm:p-5 rounded-2xl sm:rounded-3xl border border-gray-700 shadow-lg flex flex-col h-[350px] sm:h-[420px] lg:h-[480px]"
          >
            <h2 class="mb-3 sm:mb-4 text-base sm:text-lg font-semibold">
              🤖 Chatbot
            </h2>

            <!-- CHAT AREA -->
            <div
              id="chatBox"
              class="flex-1 overflow-y-auto mb-3 space-y-2 text-xs sm:text-sm p-3 rounded-xl bg-black/40 border border-gray-800"
            ></div>

            <!-- INPUT -->
            <div class="flex gap-2 sm:gap-3 items-center">
              <input
                id="msg"
                class="flex-1 min-w-0 p-2 sm:p-3 text-sm rounded-xl bg-black border border-gray-700 focus:ring-2 focus:ring-orange-500 outline-none"
                placeholder="Ask something..."
              />

              <button
                onclick="sendMsg()"
                class="px-4 sm:px-5 py-2 text-sm sm:text-base rounded-xl bg-orange-500 hover:bg-orange-600 transition"
              >
                Send
              </button>

              <!-- 🎤 MIC BUTTON -->
<button
    type="button"
    onclick="startVoice()"
    class="w-12 h-12 flex items-center justify-center
    rounded-xl bg-[#111827] border border-gray-700
    hover:border-orange-500 hover:text-orange-400
    transition duration-300 text-xl">

    🎤

</button>
            </div>
          </div>

          <!-- RESUME -->
          <form
            id="resumeForm"
            class="bg-[#0b1220]/70 backdrop-blur-xl p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-gray-700 shadow-lg"
          >
            <h2 class="mb-3 sm:mb-4 text-base sm:text-lg font-semibold">
              📄 Resume Analyzer
            </h2>

            <input
              type="file"
              name="file"
              class="mb-3 sm:mb-4 w-full text-xs sm:text-sm bg-black p-2 rounded border border-gray-700"
            />

            <button
              class="w-full bg-orange-500 py-2 sm:py-3 text-sm sm:text-base rounded-xl hover:bg-orange-600 transition"
            >
              Upload Resume
            </button>

            <!-- SCORE -->
            <div
              id="score"
              class="mt-4 text-xs sm:text-sm max-h-[500px] sm:max-h-[500px] overflow-y-auto pr-2"
            ></div>

            
            <!-- PROGRESS -->
            <div class="w-full bg-gray-700 h-2 rounded mt-3 overflow-hidden">
              <div
                id="progressBar"
                class="h-2 bg-orange-500 rounded transition-all duration-500"
                style="width: 0%"
              ></div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
