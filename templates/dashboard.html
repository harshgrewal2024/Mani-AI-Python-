<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-black text-white">

<!-- 🔥 BACKGROUND -->
<canvas id="bg"></canvas>

<!-- 🔥 NAVBAR -->
<div class="relative z-10 flex justify-between items-center px-6 py-4 border-b border-gray-800 bg-black/80 backdrop-blur-md">

    <h1 class="text-2xl font-bold">📊 Dashboard</h1>

    <div class="flex gap-3">
        <a href="/chat-page"
           class="bg-orange-500 px-4 py-2 rounded-lg hover:scale-105 transition">
           Chat 🚀
        </a>

        <a href="/logout"
           class="bg-red-500 px-4 py-2 rounded-lg hover:scale-105 transition">
           Logout
        </a>
    </div>
</div>

<!-- 🔥 MAIN -->
<div class="relative z-10 p-6">

    <div class="max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-6">

        <!-- CHAT -->
        <div class="bg-[#0b1220]/80 backdrop-blur-lg p-5 rounded-2xl border border-gray-700 flex flex-col h-[420px]">

            <h2 class="text-lg font-semibold mb-3">💬 Chat History</h2>

            <div id="chatHistory"
                class="flex-1 overflow-y-auto space-y-2 text-sm p-3 rounded bg-black/40 border border-gray-800">
            </div>

        </div>

        <!-- RESUME -->
        <div class="bg-[#0b1220]/80 backdrop-blur-lg p-5 rounded-2xl border border-gray-700 flex flex-col h-[420px]">

            <h2 class="text-lg font-semibold mb-3">📄 Resume History</h2>

            <div id="resumeHistory"
                class="flex-1 overflow-y-auto space-y-2 text-sm p-3 rounded bg-black/40 border border-gray-800">
            </div>

        </div>
</div>
    

<!-- 🔥 ANALYTICS -->
<div class="mt-16 w-full">

    <!-- TITLE -->
    <div class="flex items-center gap-4 mb-10">

        <h1 class="text-5xl font-black text-white tracking-tight">
            Dashboard Analytics
        </h1>

        <span class="text-5xl">
            📊
        </span>

    </div>

    <!-- CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

        <!-- CARD -->
        <div class="relative overflow-hidden
        bg-[#101826]
        border border-orange-500/20
        rounded-[32px]
        p-8 min-h-[230px]
        hover:-translate-y-2
        transition duration-300
        shadow-[0_0_40px_rgba(255,120,0,0.08)]">

            <div class="absolute top-0 right-0
            w-40 h-40 bg-orange-500/10
            blur-3xl rounded-full"></div>

            <div class="relative h-full flex flex-col justify-between">

                <div class="flex items-center justify-between">

                    <p class="text-gray-400 text-xl font-medium">
                        Total Chats
                    </p>

                    <div class="w-16 h-16 rounded-2xl
                    bg-orange-500/10
                    flex items-center justify-center
                    text-3xl">

                        💬

                    </div>

                </div>

                <h1 id="totalChats"
                class="text-7xl font-black text-white mt-10">
                    0
                </h1>

            </div>

        </div>

        <!-- CARD -->
        <div class="relative overflow-hidden
        bg-[#101826]
        border border-green-500/20
        rounded-[32px]
        p-8 min-h-[230px]
        hover:-translate-y-2
        transition duration-300
        shadow-[0_0_40px_rgba(0,255,120,0.08)]">

            <div class="absolute top-0 right-0
            w-40 h-40 bg-green-500/10
            blur-3xl rounded-full"></div>

            <div class="relative h-full flex flex-col justify-between">

                <div class="flex items-center justify-between">

                    <p class="text-gray-400 text-xl font-medium">
                        Resume Uploads
                    </p>

                    <div class="w-16 h-16 rounded-2xl
                    bg-green-500/10
                    flex items-center justify-center
                    text-3xl">

                        📄

                    </div>

                </div>

                <h1 id="totalResumes"
                class="text-7xl font-black text-white mt-10">
                    0
                </h1>

            </div>

        </div>

        <!-- CARD -->
        <div class="relative overflow-hidden
        bg-[#101826]
        border border-cyan-500/20
        rounded-[32px]
        p-8 min-h-[230px]
        hover:-translate-y-2
        transition duration-300
        shadow-[0_0_40px_rgba(0,180,255,0.08)]">

            <div class="absolute top-0 right-0
            w-40 h-40 bg-cyan-500/10
            blur-3xl rounded-full"></div>

            <div class="relative h-full flex flex-col justify-between">

                <div class="flex items-center justify-between">

                    <p class="text-gray-400 text-xl font-medium">
                        Average ATS
                    </p>

                    <div class="w-16 h-16 rounded-2xl
                    bg-cyan-500/10
                    flex items-center justify-center
                    text-3xl">

                        📈

                    </div>

                </div>

                <h1 id="avgScore"
                class="text-7xl font-black text-white mt-10">
                    0
                </h1>

            </div>

        </div>

        <!-- CARD -->
        <div class="relative overflow-hidden
        bg-[#101826]
        border border-yellow-500/20
        rounded-[32px]
        p-8 min-h-[230px]
        hover:-translate-y-2
        transition duration-300
        shadow-[0_0_40px_rgba(255,200,0,0.08)]">

            <div class="absolute top-0 right-0
            w-40 h-40 bg-yellow-500/10
            blur-3xl rounded-full"></div>

            <div class="relative h-full flex flex-col justify-between">

                <div class="flex items-center justify-between">

                    <p class="text-gray-400 text-xl font-medium">
                        Highest Score
                    </p>

                    <div class="w-16 h-16 rounded-2xl
                    bg-yellow-500/10
                    flex items-center justify-center
                    text-3xl">

                        🏆

                    </div>

                </div>

                <h1 id="highestScore"
                class="text-7xl font-black text-white mt-10">
                    0
                </h1>

            </div>

        </div>

    </div>

</div>

    </div>

</div>

<script src="/static/dashboard.js"></script>
<script src="/static/script.js"></script>


</body>
</html>
